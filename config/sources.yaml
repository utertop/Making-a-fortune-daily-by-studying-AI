# AI Signal Radar v0.1 source registry
# Keep official or trusted URLs only. Do not add short links or unknown mirrors.

sources:
  - name: GitHub AI Search
    type: github_search
    url: https://api.github.com/search/repositories
    priority: high
    enabled: true
    official: true
    tags:
      - github
      - ai
      - open-source
    poll_interval_minutes: 1440
    allowlist_domain: api.github.com
    query: 'topic:ai OR "AI agent" OR "coding agent" OR MCP OR RAG'

  - name: OpenAI News
    type: rss
    url: https://openai.com/news/rss.xml
    priority: high
    enabled: true
    official: true
    tags:
      - openai
      - official-blog
    poll_interval_minutes: 1440
    allowlist_domain: openai.com

  - name: GitHub Blog
    type: rss
    url: https://github.blog/feed/
    priority: medium
    enabled: true
    official: true
    tags:
      - github
      - official-blog
    poll_interval_minutes: 1440
    allowlist_domain: github.blog

  - name: Hugging Face Blog
    type: rss
    url: https://huggingface.co/blog/feed.xml
    priority: medium
    enabled: true
    official: true
    tags:
      - hugging-face
      - official-blog
    poll_interval_minutes: 1440
    allowlist_domain: huggingface.co

  - name: Hacker News
    type: hn_api
    url: https://hacker-news.firebaseio.com/v0
    priority: medium
    enabled: true
    official: true
    tags:
      - hacker-news
      - developer-community
    poll_interval_minutes: 1440
    allowlist_domain: hacker-news.firebaseio.com
