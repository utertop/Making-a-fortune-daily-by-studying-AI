name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  api:
    name: Python API
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt

      - name: Compile Python modules
        run: python -m compileall apps/api scripts

      - name: Smoke test SQLite repository
        run: python scripts/smoke_db.py

      - name: Preview Feishu digest without sending
        run: python scripts/push_today.py --limit 10

  web:
    name: Next.js Web
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type-check Web
        working-directory: apps/web
        run: npx tsc --noEmit

      - name: Build Web
        working-directory: apps/web
        run: npm run build
